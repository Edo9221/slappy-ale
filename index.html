<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    touch-action: none; user-select: none; -webkit-user-select: none;
    background: #70c5ce; font-family: -apple-system, system-ui, sans-serif;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    color: white; text-align: center; padding: 20px; gap: 16px;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
  }
  #overlay.game-overlay { pointer-events: none; }
  #overlay.menu-overlay { pointer-events: auto; }

  #title { font-size: clamp(36px, 10vw, 64px); font-weight: 900; letter-spacing: 2px; margin-bottom: 8px; }
  #subtitle { font-size: clamp(14px, 4vw, 20px); font-weight: 700; margin-bottom: 8px; opacity: 0.95; }
  #message { font-size: clamp(16px, 4.5vw, 22px); font-weight: 700; }

  .level-buttons { display: flex; flex-direction: column; gap: 12px; width: min(320px, 80vw); }
  .level-btn {
    font-family: inherit; font-weight: 900; font-size: clamp(18px, 5vw, 24px);
    padding: 16px 24px; border: 4px solid #000; border-radius: 14px;
    color: white; cursor: pointer; letter-spacing: 1px;
    text-shadow: 2px 2px 0 #000; box-shadow: 0 6px 0 #000; transition: transform 0.08s, box-shadow 0.08s;
    -webkit-appearance: none; appearance: none;
  }
  .level-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
  .level-btn.easy { background: #4CAF50; }
  .level-btn.medium { background: #FF9800; }
  .level-btn.hard { background: #E53935; }

  #score {
    position: absolute; top: 8%; left: 0; width: 100%;
    text-align: center; font-size: clamp(48px, 12vw, 80px); font-weight: 900; color: white;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    display: none; pointer-events: none;
  }
</style>

let W, H;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

const LEVELS = {
  easy:   { gravity: 0.30, jump: -8.30, pipeSpeed: 4.7, pipeGap: 365, spawnEvery: 73, singlePipes: true,  label: 'FACILE' },
  medium: { gravity: 0.35, jump: -8.25, pipeSpeed: 5.2, pipeGap: 355, spawnEvery: 67, singlePipes: false, label: 'MEDIO'  },

};
let cfg = LEVELS.medium;
let currentLevel = 'medium';

const PIPE_WIDTH = 62;
const GROUND_H = 50;
const BIRD_H = 90;
const BIRD_W = BIRD_H * BIRD_ASPECT;

// Cacca: altezza variabile (22%-42% dell area giocabile, come i tubi)
const CACCA_MIN_FRAC = 0.22;
const CACCA_RANGE_FRAC = 0.20;

// Pattern cacche: primi 4 ostacoli sono sempre tubi,
// poi ogni 3 ostacoli uno e' cacca (T T C T T C ...)
const INITIAL_SAFE = 4;
const CACCA_EVERY = 3;

let bird = { x: 0, y: 0, vy: 0 };
let pipes = [];
let score = 0;
let state = 'menu';
let gameFrame = 0;
let time = 0;
let obstacleCount = 0;
let caccaIndex = 0;

function reset() {
  bird.x = W * 0.28;
  bird.y = H / 2;
  bird.vy = 0;
  pipes = [];
  score = 0;
  gameFrame = 0;
  obstacleCount = 0;
  caccaIndex = 0;
  scoreEl.textContent = '0';
}

  obstacleCount++;
  const shouldBeCacca = obstacleCount > INITIAL_SAFE
                        && (obstacleCount - INITIAL_SAFE) % CACCA_EVERY === 0;

  if (shouldBeCacca) {
    // Cacca: ostacolo solo dal basso, dimensione variabile come i tubi
    const img = caccaSprites[caccaIndex % caccaSprites.length];
    caccaIndex++;
    const aspect = (img.naturalW || img.naturalWidth || 100) / (img.naturalH || img.naturalHeight || 100);
    const playH = H - GROUND_H;
    const h = playH * (CACCA_MIN_FRAC + Math.random() * CACCA_RANGE_FRAC);
    const w = h * aspect;
    pipes.push({ x: W + 10, type: 'cacca', subtype: 'bottom', img, w, h, passed: false });
    return;
  }

  if (cfg.singlePipes) {
    // Facile: tubo singolo random alto o basso
    const type = Math.random() < 0.5 ? 'bottom' : 'top';
    const playH = H - GROUND_H;
    const h = playH * (0.18 + Math.random() * 0.22);
    pipes.push({ x: W + 10, type, h, passed: false });
  } else {
    // Medio/Difficile: tubo sopra + tubo sotto
    const minTop = 60;
    const maxTop = H - cfg.pipeGap - GROUND_H - 60;
    const top = minTop + Math.random() * Math.max(20, maxTop - minTop);
    pipes.push({ x: W + 10, type: 'normal', top, passed: false });
  }
}

function showMenu() {
  state = 'menu';
  overlay.className = 'menu-overlay';
  titleEl.textContent = 'Slappy Ale';
  titleEl.style.display = '';
  subtitleEl.style.display = '';
  subtitleEl.textContent = 'Scegli il livello';
  levelButtonsContainer.style.display = '';
  messageEl.textContent = '';
  overlay.style.display = 'flex';
  scoreEl.style.display = 'none';
}

function startGame(levelKey) {
  currentLevel = levelKey;
  cfg = LEVELS[levelKey];
  reset();
  state = 'playing';
  overlay.style.display = 'none';
  scoreEl.style.display = 'block';
  bird.vy = cfg.jump;
}

function gameOver() {
  state = 'over';
  overlay.className = 'game-overlay';
  titleEl.textContent = 'GAME OVER';
  titleEl.style.display = '';
  subtitleEl.style.display = '';
  subtitleEl.textContent = 'Livello: ' + cfg.label + '  —  Punteggio: ' + score;
  levelButtonsContainer.style.display = 'none';
  messageEl.textContent = 'Tocca per tornare al menu';
  overlay.style.display = 'flex';
  scoreEl.style.display = 'none';
}

function flap() {
  if (state === 'playing') {
    bird.vy = cfg.jump;
  } else if (state === 'over') {
    showMenu();
  }
}

function handle(e) {
  if (state === 'menu') return;
  if (e) e.preventDefault();
  flap();
}
canvas.addEventListener('touchstart', handle, { passive: false });
canvas.addEventListener('mousedown', handle);
document.addEventListener('keydown', (e) => {
  if ((e.code === 'Space' || e.code === 'ArrowUp') && state !== 'menu') {
    e.preventDefault(); flap();
  }
});

levelButtons.forEach(btn => {
  btn.addEventListener('click', (e) => { e.stopPropagation(); startGame(btn.dataset.level); });
  btn.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); startGame(btn.dataset.level); });
});

function update() {
  if (state !== 'playing') return;
  gameFrame++;
  bird.vy += cfg.gravity;
  bird.y += bird.vy;

  if (gameFrame === 40 || (gameFrame > 40 && (gameFrame - 40) % cfg.spawnEvery === 0)) spawnObstacle();

  const r = COLLISION_R - 4;
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    const pw = (p.type === 'cacca') ? p.w : PIPE_WIDTH;
    p.x -= cfg.pipeSpeed;
    if (!p.passed && p.x + pw < bird.x) {
      p.passed = true;
      score++;
      scoreEl.textContent = score;
    }
    if (p.x + pw < -20) pipes.splice(i, 1);
  }

  if (bird.y + r > H - GROUND_H) { gameOver(); return; }
  if (bird.y - r < 0) { bird.y = r; bird.vy = 0; }

  for (const p of pipes) {
    if (p.type === 'cacca') {
      // Cacca solo dal basso. Collisione rettangolare con margine di tolleranza (12%)
      const margin = 0.12;
      const effW = p.w * (1 - margin);
      const effH = p.h * (1 - margin);
      const left  = p.x + (p.w - effW) / 2;
      const right = left + effW;
      if (bird.x + r > left && bird.x - r < right) {
        if (bird.y + r > H - GROUND_H - effH) { gameOver(); return; }
      }
      continue;
    }
    if (bird.x + r > p.x && bird.x - r < p.x + PIPE_WIDTH) {
      if (p.type === 'normal') {
        if (bird.y - r < p.top || bird.y + r > p.top + cfg.pipeGap) { gameOver(); return; }
      } else if (p.type === 'bottom') {
        if (bird.y + r > H - GROUND_H - p.h) { gameOver(); return; }
      } else if (p.type === 'top') {
        if (bird.y - r < p.h) { gameOver(); return; }
      }
    }
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  let angle = 0;
  if (state === 'playing' || state === 'over') {
    angle = Math.max(-0.4, Math.min(1.0, bird.vy * 0.07));
  } else {
    bird.y = H / 2 + Math.sin(time * 0.08) * 8;
    angle = Math.sin(time * 0.08) * 0.05;
  }
  ctx.rotate(angle);
  if (birdSprite.complete && birdSprite.naturalWidth > 0) {
    ctx.drawImage(birdSprite, -BIRD_W / 2, -BIRD_H / 2, BIRD_W, BIRD_H);
  } else {
    ctx.fillStyle = '#f7d51d';
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_H / 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawObstacle(p) {
  if (p.type === 'cacca') {
    // Solo dal basso: la cacca sta appoggiata sul terreno
    const y = H - GROUND_H - p.h;
    if (p.img.complete && p.img.naturalWidth > 0) {
      ctx.drawImage(p.img, p.x, y, p.w, p.h);
    } else {
      ctx.fillStyle = '#6b3410';
      ctx.fillRect(p.x, y, p.w, p.h);
    }
    return;
  }

  const capH = 18;
  const cap = 4;
  ctx.fillStyle = '#5ac45a';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;

  if (p.type === 'normal') {
    ctx.fillRect(p.x, 0, PIPE_WIDTH, p.top - capH);
    ctx.fillRect(p.x - cap, p.top - capH, PIPE_WIDTH + cap * 2, capH);
    ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.top - capH);
    ctx.strokeRect(p.x - cap, p.top - capH, PIPE_WIDTH + cap * 2, capH);
    const by = p.top + cfg.pipeGap;
    const bh = H - GROUND_H - by;
    ctx.fillRect(p.x, by + capH, PIPE_WIDTH, bh - capH);
    ctx.fillRect(p.x - cap, by, PIPE_WIDTH + cap * 2, capH);
    ctx.strokeRect(p.x, by + capH, PIPE_WIDTH, bh - capH);
    ctx.strokeRect(p.x - cap, by, PIPE_WIDTH + cap * 2, capH);
  } else if (p.type === 'bottom') {
    const by = H - GROUND_H - p.h;
    const bh = p.h;
    ctx.fillRect(p.x, by + capH, PIPE_WIDTH, bh - capH);
    ctx.fillRect(p.x - cap, by, PIPE_WIDTH + cap * 2, capH);
    ctx.strokeRect(p.x, by + capH, PIPE_WIDTH, bh - capH);
    ctx.strokeRect(p.x - cap, by, PIPE_WIDTH + cap * 2, capH);
  } else if (p.type === 'top') {
    ctx.fillRect(p.x, 0, PIPE_WIDTH, p.h - capH);
    ctx.fillRect(p.x - cap, p.h - capH, PIPE_WIDTH + cap * 2, capH);
    ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.h - capH);
    ctx.strokeRect(p.x - cap, p.h - capH, PIPE_WIDTH + cap * 2, capH);
  }
}

function draw() {
  ctx.fillStyle = '#70c5ce';
  ctx.fillRect(0, 0, W, H);
  for (const p of pipes) drawObstacle(p);
  ctx.fillStyle = '#ded895';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  ctx.fillStyle = '#c0a84a';
  ctx.fillRect(0, H - GROUND_H, W, 5);
  drawBird();
}

function loop() {
  update(); draw();
  time++;
  requestAnimationFrame(loop);
}

bird.x = W * 0.5;
bird.y = H * 0.35;
loop();
</script>
</body>
</html>
